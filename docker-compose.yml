services:
  postgres-db:
    container_name: postgres_proxy_container
    image: postgres:latest
    environment:
      POSTGRES_USER: h3kar360
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-db:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    networks:
      - postgres-db
    restart: unless-stopped

networks:
  postgres-db:
    driver: bridge

volumes:
  postgres-db: